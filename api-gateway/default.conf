server {
  listen 8080;

  # Basic proxy settings
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # Item Service routes
  location = /items {
    proxy_pass http://item-service:8081/items;
  }
  location ^~ /items/ {
    proxy_pass http://item-service:8081;
  }

  # Order Service routes
  location = /orders {
    proxy_pass http://order-service:8082/orders;
  }
  location ^~ /orders/ {
    proxy_pass http://order-service:8082;
  }

  # Payment Service routes
  location = /payments {
    proxy_pass http://payment-service:8083/payments;
  }
  location ^~ /payments/ {
    proxy_pass http://payment-service:8083;
  }

  # Optional: gateway health
  location = /health {
    return 200 '{"status":"ok","service":"api-gateway"}';
    add_header Content-Type application/json;
  }
}

